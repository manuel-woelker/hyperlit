title = "Hyperlit Example Book"
src_directory = "."
# Include all Rust files, but exclude test files
src_globs = ["*.rs", "!/runner/sample", "!node_modules/**/*", "!.*/**/*", "!/target/**/*", "!/output"]
docs_directory = "."
doc_globs = ["*.md", "*.mdx"]
build_directory = "build"
output_directory = "output"
source_link_template = "https://github.com/manuel-woelker/hyperlit/blob/master/{path}#L{line}"

[[structure.chapter]]
label = "Laws of computing"
label_template = "${heading} ${date}"
tags = ["law"]
directories = ["laws"]

[[structure.chapter]]
label = "Decision records"
tags = ["decision"]
directories = ["non_existing_directory"]

[[structure.chapter]]
label = "How Do I ... ?"
tags = ["howto"]
